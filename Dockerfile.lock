# Minimal image just for generating the lockfile in the target Python version
FROM python:3.11-slim@sha256:9358444059ed78e2975ada2c189f1c1a3144a5dab6f35bff8c981afb38946634

RUN pip install --no-cache-dir pip-tools==7.5.3

WORKDIR /app
COPY pyproject.toml .

ENTRYPOINT ["pip-compile", "--all-extras", "--generate-hashes", "--output-file=/out/requirements.lock", "pyproject.toml"]
