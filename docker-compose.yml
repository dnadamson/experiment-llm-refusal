services:
  notebook:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./configs:/app/configs
      - ./outputs:/app/outputs
    entrypoint: jupyter
    command: notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    environment:
      - TOKENIZERS_PARALLELISM=false

  train:
    build: .
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./configs:/app/configs
      - ./outputs:/app/outputs
    # Override CMD with: docker compose run train safety_finetune.train --config configs/smoke.yaml
