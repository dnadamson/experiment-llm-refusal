services:
  notebook:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./configs:/app/configs
      - ./outputs:/app/outputs
      - ../hf-cache:/hf-cache
    entrypoint: jupyter
    command: notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    environment:
      - TOKENIZERS_PARALLELISM=false
      - HF_HOME=/hf-cache
      - PYTHONPATH=/app/src

  train:
    build: .
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./configs:/app/configs
      - ./outputs:/app/outputs
      - ./tests:/app/tests
      - ../hf-cache:/hf-cache
    environment:
      - HF_HOME=/hf-cache
      - PYTHONPATH=/app/src
    # Override CMD with: docker compose run train safety_finetune.train --config configs/smoke.yaml
